<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page3</title>
<link href="https://fonts.googleapis.com/css2?family=Marck+Script&family=Cormorant+Garamond:wght@600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
background:#000;
height:100vh;
overflow:hidden;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-family:'Cormorant Garamond',serif;
}
.timer-box{
background:#111;
border:2px solid #ff69b4;
border-radius:30px;
padding:30px 45px;
box-shadow:0 0 30px rgba(255,105,180,.6),0 0 90px rgba(255,105,180,.3);
opacity:0;
transform:translateY(-500px);
transition:transform 2.4s cubic-bezier(.22,1,.36,1),opacity 1.2s ease;
}
.timer-box.show{opacity:1;transform:translateY(0)}
#timer{
color:#ff69b4;
font-size:clamp(30px,5vw,72px);
text-align:center;
line-height:1.15;
}
#caption{
margin-top:35px;
font-family:'Marck Script',cursive;
font-size:clamp(34px,5vw,72px);
color:#ffd1e8;
opacity:0;
transition:opacity 2s ease;
}
#caption.show{opacity:1}
.back-btn{
margin-top:25px;
text-decoration:none;
color:#fff;
border:2px solid #ff69b4;
border-radius:999px;
padding:10px 22px;
background:#111;
opacity:0;
transition:opacity 1.5s ease, transform .3s ease;
font-size:clamp(18px,2vw,28px);
}
.back-btn.show{opacity:1}
.back-btn:hover{transform:scale(1.05)}
.beat{animation:beat .35s ease}
@keyframes beat{
0%{transform:scale(1)}
50%{transform:scale(1.05)}
100%{transform:scale(1)}
}

.fade-out{animation:fadeOut .8s forwards}@keyframes fadeOut{to{opacity:0}}
.love{position:fixed;top:-15vh;font-family:'Cormorant Garamond',serif;font-weight:700;color:rgba(255,105,180,.10);pointer-events:none;white-space:nowrap;animation:fallLove linear forwards;z-index:5}
@keyframes fallLove{from{transform:translateY(-20vh) rotate(var(--r));opacity:0}10%{opacity:1}to{transform:translateY(120vh) rotate(var(--r));opacity:1}}
</style>
</head>
<body>

<div class="timer-box" id="timerBox">
<div id="timer"></div>
</div>

<div id="caption">В этот день...</div>

<a href="index.html" class="back-btn" id="backBtn">← Вернуться</a>

<audio id="clickSound" src="click.mp3(1).mp3"></audio>
<audio id="heartbeatSound" src="heartbeat.mp3(1).mp3"></audio>

<script>
const timer=document.getElementById('timer');
const timerBox=document.getElementById('timerBox');
const caption=document.getElementById('caption');
const backBtn=document.getElementById('backBtn');

const clickSound=document.getElementById('clickSound');
const heartbeat=document.getElementById('heartbeatSound');

const startDate=new Date('2024-08-08T00:00:00');

function updateTimer(){
 let diff=Math.floor((new Date()-startDate)/1000);
 const days=Math.floor(diff/86400); diff%=86400;
 const hours=Math.floor(diff/3600); diff%=3600;
 const minutes=Math.floor(diff/60);
 const seconds=diff%60;

 timer.innerHTML=days+" дней<br>"+hours+" часов<br>"+minutes+" минут<br>"+seconds+" секунд";
}

setTimeout(()=>{
 clickSound.play().catch(()=>{});
 timerBox.classList.add('show');

 setTimeout(()=>{
   caption.classList.add('show');
 },2200);

 setTimeout(()=>{
   backBtn.classList.add('show');
 },3600);

 updateTimer();

 setInterval(()=>{
   heartbeat.pause();
   heartbeat.currentTime=0;
   heartbeat.play().catch(()=>{});

   timerBox.classList.remove('beat');
   void timerBox.offsetWidth;
   timerBox.classList.add('beat');

   updateTimer();
 },1000);

},600);

backBtn.addEventListener('click',function(e){
e.preventDefault();
[timerBox,caption,backBtn].forEach(el=>el.classList.add('fade-out'));
let v=1;
const f=setInterval(()=>{v=Math.max(0,v-0.08);heartbeat.volume=v;if(v<=0){heartbeat.pause();clearInterval(f);}},80);
setTimeout(()=>{for(let i=0;i<26;i++){const d=document.createElement('div');d.className='love';d.textContent='I LOVE YOU';d.style.left=(Math.random()*90)+'vw';d.style.fontSize=(40+Math.random()*90)+'px';d.style.setProperty('--r',(-25+Math.random()*50)+'deg');d.style.animationDuration=(2.5+Math.random()*2)+'s';document.body.appendChild(d);}},900);
setTimeout(()=>location.href='index.html',5200);
});
</script>
</body>
</html>
